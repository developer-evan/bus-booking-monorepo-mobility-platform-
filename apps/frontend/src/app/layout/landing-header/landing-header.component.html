<header class="header">
  <div class="header__inner">
    <a routerLink="/" class="brand" aria-label="BusBook home">
      <span class="brand__mark" aria-hidden="true">
        <i class="pi pi-directions"></i>
      </span>
      <span class="brand__text">BusBook</span>
    </a>

    <nav class="nav" aria-label="Main navigation">
      @for (link of navLinks; track link.href) {
        <a class="nav__link" [href]="link.href">{{ link.label }}</a>
      }
    </nav>

    <div class="header__actions">
      <app-theme-toggle />
      <p-button label="Sign in" [text]="true" severity="secondary" routerLink="/portal" />
      <p-button label="Book a trip" routerLink="/portal" />
    </div>
  </div>
</header>
